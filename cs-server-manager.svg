<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Light background — references the white CZ box-art background -->
  <rect width="64" height="64" rx="14" fill="#f4f4f0"/>

  <!-- Crosshair ring -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#1a1c22" stroke-width="1.5"/>

  <!-- Crosshair lines -->
  <line x1="32" y1="7"  x2="32" y2="17" stroke="#1a1c22" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="47" x2="32" y2="57" stroke="#1a1c22" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7"  y1="32" x2="17" y2="32" stroke="#1a1c22" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="57" y2="32" stroke="#1a1c22" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="1.2" fill="#1a1c22"/>

  <!-- Server rack — bottom-right, clear of crosshair lines -->
  <rect x="44" y="49" width="15" height="2.5" rx="1" fill="#3a3a4a"/>
  <rect x="44" y="53" width="15" height="2.5" rx="1" fill="#3a3a4a"/>
  <rect x="44" y="57" width="15" height="2.5" rx="1" fill="#3a3a4a"/>
  <!-- Status LEDs -->
  <circle cx="46.5" cy="50.2" r="0.8" fill="#c8a800"/>
  <circle cx="46.5" cy="54.2" r="0.8" fill="#6abf50"/>
  <circle cx="46.5" cy="58.2" r="0.8" fill="#6abf50"/>
</svg>

name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-svg-dev libqt6svg6-dev \
            libgl1-mesa-dev

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Confirm binary exists
        run: test -f build/cs_server_manager

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-binary-ci
          path: build/cs_server_manager
          retention-days: 7

  build-flatpak:
    name: Build Flatpak (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Resolve latest KDE runtime version
        id: kde
        run: |
          latest=$(flatpak remote-ls --user --runtime --columns=ref flathub \
            | grep "^runtime/org.kde.Platform/x86_64/" \
            | sed 's|runtime/org.kde.Platform/x86_64/||' \
            | grep -E '^[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [[ -z "$latest" ]]; then
            echo "::error::Could not resolve the latest org.kde.Platform version from Flathub."
            exit 1
          fi
          echo "Resolved KDE runtime version: $latest"
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Patch manifest runtime-version
        run: |
          sed -i "s/^runtime-version:.*/runtime-version: '${{ steps.kde.outputs.version }}'/" \
            io.github.wheat32.CSServerManager.yml

      - name: Install KDE runtime and SDK
        run: |
          flatpak install --user --noninteractive flathub \
            org.kde.Platform/x86_64/${{ steps.kde.outputs.version }} \
            org.kde.Sdk/x86_64/${{ steps.kde.outputs.version }}

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --repo=.flatpak-repo \
            .flatpak-build \
            io.github.wheat32.CSServerManager.yml

      - name: Export bundle
        run: |
          flatpak build-bundle \
            .flatpak-repo \
            io.github.wheat32.CSServerManager.flatpak \
            io.github.wheat32.CSServerManager

      - name: Confirm bundle exists
        run: test -f io.github.wheat32.CSServerManager.flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-ci
          path: io.github.wheat32.CSServerManager.flatpak
          retention-days: 7

  build-appimage:
    name: Build AppImage (Ubuntu)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-svg-dev libqt6svg6-dev qt6-wayland \
            libgl1-mesa-dev \
            python3 \
            wget

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Confirm AppImage exists
        run: ls dist/CSServerManager-*.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-ci
          path: dist/CSServerManager-*.AppImage
          retention-days: 7

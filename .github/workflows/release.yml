name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build-native:
    name: Build Native (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-svg-dev libqt6svg6-dev \
            libgl1-mesa-dev jq

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package tarball
        run: |
          mkdir -p dist
          cp build/cs_server_manager dist/
          tar -czf cs-server-manager-linux-x86_64.tar.gz -C dist cs_server_manager

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-tarball
          path: cs-server-manager-linux-x86_64.tar.gz

  build-flatpak:
    name: Build Flatpak (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Resolve latest KDE runtime version
        id: kde
        run: |
          latest=$(flatpak remote-ls --user --runtime --columns=ref flathub \
            | grep "^runtime/org.kde.Platform/x86_64/" \
            | sed 's|runtime/org.kde.Platform/x86_64/||' \
            | grep -E '^[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [[ -z "$latest" ]]; then
            echo "::error::Could not resolve the latest org.kde.Platform version from Flathub."
            exit 1
          fi
          echo "Resolved KDE runtime version: $latest"
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Patch manifest runtime-version
        run: |
          sed -i "s/^runtime-version:.*/runtime-version: '${{ steps.kde.outputs.version }}'/" \
            io.github.wheat32.CSServerManager.yml

      - name: Install KDE runtime and SDK
        run: |
          flatpak install --user --noninteractive flathub \
            org.kde.Platform/x86_64/${{ steps.kde.outputs.version }} \
            org.kde.Sdk/x86_64/${{ steps.kde.outputs.version }}

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --repo=.flatpak-repo \
            .flatpak-build \
            io.github.wheat32.CSServerManager.yml

      - name: Export bundle
        run: |
          flatpak build-bundle \
            .flatpak-repo \
            io.github.wheat32.CSServerManager.flatpak \
            io.github.wheat32.CSServerManager

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: io.github.wheat32.CSServerManager.flatpak

  build-appimage:
    name: Build AppImage (Ubuntu)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-svg-dev libqt6svg6-dev qt6-wayland \
            libgl1-mesa-dev \
            python3 \
            wget

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-bundle
          path: dist/CSServerManager-*.AppImage

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-native, build-flatpak, build-appimage]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Read version
        id: tag
        run: |
          VERSION=$(jq -r '.app_version' src/version.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "NAME=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download native tarball
        uses: actions/download-artifact@v4
        with:
          name: native-tarball

      - name: Download Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: appimage-bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.NAME }}
          body: |
            Automated release built from commit ${{ github.sha }}.

            **Commit message:** ${{ github.event.head_commit.message }}

            ## Downloads

            | File | Description |
            |------|-------------|
            | `CSServerManager-${{ steps.tag.outputs.VERSION }}-x86_64.AppImage` | AppImage — self-contained, no install required |
            | `io.github.wheat32.CSServerManager.flatpak` | Flatpak bundle |
            | `cs-server-manager-linux-x86_64.tar.gz` | Native binary tarball |

            ### AppImage (recommended)
            ```bash
            chmod +x CSServerManager-${{ steps.tag.outputs.VERSION }}-x86_64.AppImage
            ./CSServerManager-${{ steps.tag.outputs.VERSION }}-x86_64.AppImage
            ```

            ### Flatpak
            The Flatpak calls the host's `hlds_run` via `flatpak-spawn --host`, so
            HLDS must be installed on your system.
            ```bash
            flatpak install io.github.wheat32.CSServerManager.flatpak
            flatpak run io.github.wheat32.CSServerManager
            ```

            ### Native binary
            Requires Qt 6 libraries installed on your system.
            ```bash
            tar -xzf cs-server-manager-linux-x86_64.tar.gz
            ./cs_server_manager
            ```

            > See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage instructions.
          files: |
            CSServerManager-${{ steps.tag.outputs.VERSION }}-x86_64.AppImage
            io.github.wheat32.CSServerManager.flatpak
            cs-server-manager-linux-x86_64.tar.gz
          make_latest: true
